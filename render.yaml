services:
  - type: web
    name: mon_stock
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py shell < create_superuser.py"
    startCommand: "gunicorn mon_stock.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.onrender.com,127.0.0.1,localhost"
      - key: DATABASE_URL
        scope: run
