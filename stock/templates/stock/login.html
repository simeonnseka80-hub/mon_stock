{% extends 'stock/base.html' %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h2>Connexion</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Se connecter</button>
        </form>
    </div>
</div>
{% endblock %}
