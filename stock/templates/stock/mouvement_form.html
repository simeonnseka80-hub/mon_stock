{% extends 'stock/base.html' %}
{% block title %}Nouveau mouvement{% endblock %}
{% block content %}
<h2>{% if type_mvt == 'ENTREE' %}Nouvelle entrée{% else %}Nouvelle sortie{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Enregistrer</button>
    <a href="{% url 'mouvement_list' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
