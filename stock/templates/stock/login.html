{% extends 'stock/base.html' %}
{% block title %}Connexion - Khalil Gestion Pro{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-primary-900 tracking-tight">Connexion</h2>
        <p class="text-gray-500 text-sm mt-2">Accédez à votre console d'administration Khalil Gestion Pro.</p>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-card border border-primary-100">
        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Nom d'utilisateur</label>
                <input type="text" name="username" required class="w-full bg-gray-50 border border-gray-200 text-gray-800 py-3 px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-400 focus:bg-white text-sm transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Mot de passe</label>
                <input type="password" name="password" required class="w-full bg-gray-50 border border-gray-200 text-gray-800 py-3 px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-400 focus:bg-white text-sm transition">
            </div>
            <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition mt-2">
                Se connecter
            </button>
        </form>
    </div>
</div>
{% endblock %}
