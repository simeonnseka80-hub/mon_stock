{% extends 'stock/base.html' %}
{% block title %}Nouveau mouvement{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-primary-800 mb-6">
        {% if type_mvt == 'ENTREE' %}Nouvelle entrée (Achat){% else %}Nouvelle sortie (Vente){% endif %}
    </h1>

    <div class="bg-white shadow-md rounded-lg p-6 border border-gray-200">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="flex justify-end space-x-3 pt-4">
                <a href="{% url 'mouvement_list' %}" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-md text-sm font-medium">Annuler</a>
                <button type="submit" class="bg-primary-600 hover:bg-primary-700 text-white px-4 py-2 rounded-md text-sm font-medium shadow">Enregistrer</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
